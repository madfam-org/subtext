# Subtext Secrets Template — NEVER commit with real values.
#
# Bootstrap:
#   SESSION_SECRET=$(openssl rand -hex 32)
#   DB_PW=$(openssl rand -hex 24)
#   kubectl create secret generic subtext-secrets --namespace=subtext \
#     --from-literal=APP_ENV=production \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://subtext:${DB_PW}@postgres.data.svc.cluster.local:5432/subtext" \
#     --from-literal=REDIS_URL="redis://redis.data.svc.cluster.local:6379/0" \
#     --from-literal=SESSION_SECRET="$SESSION_SECRET" \
#     --from-literal=ALLOWED_ORIGINS="https://subtext.live" \
#     --from-literal=JANUA_BASE_URL="https://auth.madfam.io" \
#     --from-literal=JANUA_CLIENT_ID="subtext" \
#     --from-literal=JANUA_CLIENT_SECRET="<from Janua admin>" \
#     --from-literal=JANUA_JWKS_URI="https://auth.madfam.io/.well-known/jwks.json" \
#     --from-literal=S3_ENDPOINT="https://<acct>.r2.cloudflarestorage.com" \
#     --from-literal=S3_ACCESS_KEY="<from R2>" \
#     --from-literal=S3_SECRET_KEY="<from R2>" \
#     --from-literal=S3_BUCKET="subtext-audio" \
#     --from-literal=MODEL_CACHE_DIR=/models
---
apiVersion: v1
kind: Secret
metadata:
  name: subtext-secrets
  namespace: subtext
type: Opaque
stringData:
  APP_ENV: "production"
  DATABASE_URL: "postgresql+asyncpg://subtext:<PASSWORD>@postgres.data.svc.cluster.local:5432/subtext"
  REDIS_URL: "redis://redis.data.svc.cluster.local:6379/0"
  SESSION_SECRET: ""
  ALLOWED_ORIGINS: "https://subtext.live"
  JANUA_BASE_URL: "https://auth.madfam.io"
  JANUA_CLIENT_ID: "subtext"
  JANUA_CLIENT_SECRET: ""
  JANUA_JWKS_URI: "https://auth.madfam.io/.well-known/jwks.json"
  S3_ENDPOINT: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_BUCKET: "subtext-audio"
  MODEL_CACHE_DIR: "/models"
