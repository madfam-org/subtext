name: Enclii build & publish

# GitOps flow: push → build api image → cosign sign → push to GHCR → commit
# digest to infra/k8s/production/kustomization.yaml → ArgoCD auto-syncs.
#
# Image: ghcr.io/madfam-org/subtext-api:<sha>
# Follows the MADFAM internal-devops pattern (routecraft / madlab / karafiel).

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'infra/k8s/production/**'
      - '.github/workflows/enclii-build.yml'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build api
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.3'

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/madfam-org/subtext-api:${{ github.sha }}
            ghcr.io/madfam-org/subtext-api:main
          labels: |
            org.opencontainers.image.source=https://github.com/madfam-org/subtext
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Sign image (keyless, Fulcio/Rekor)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes "ghcr.io/madfam-org/subtext-api@${{ steps.build.outputs.digest }}"

  update-manifest:
    name: Commit digest to kustomization.yaml
    needs: build
    if: needs.build.result == 'success'
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ENCLII_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Pin digest
        run: |
          cd infra/k8s/production
          kustomize edit set image "ghcr.io/madfam-org/subtext-api=ghcr.io/madfam-org/subtext-api@${{ needs.build.outputs.digest }}"

      - name: Commit & push
        run: |
          git config user.name "subtext-ci[bot]"
          git config user.email "ci@subtext.live"
          if git diff --quiet infra/k8s/production/kustomization.yaml; then
            echo "No digest change to commit."
            exit 0
          fi
          git add infra/k8s/production/kustomization.yaml
          git commit -m "ci: pin subtext-api digest from ${{ github.sha }}"
          git push

      - name: Notify enclii lifecycle
        if: env.ENCLII_API_URL != ''
        env:
          ENCLII_API_URL: ${{ secrets.ENCLII_API_URL }}
          ENCLII_DEPLOY_TOKEN: ${{ secrets.ENCLII_DEPLOY_TOKEN }}
        run: |
          curl -sS -X POST "$ENCLII_API_URL/v1/callbacks/lifecycle-event" \
            -H "Authorization: Bearer $ENCLII_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"project":"subtext","commit":"${{ github.sha }}","event":"image-digest-committed"}' || true
